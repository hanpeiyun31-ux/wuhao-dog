<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>吴浩和韩沛昀的粒子宇宙</title>
  <style>
    :root {
      color-scheme: dark;
      --pink: #ff7abf;
      --rose: #ff4f9a;
      --violet: #9b6dff;
      --cyan: #73f7ff;
      --gold: #ffe28a;
      --text: #fff7ff;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #080417;
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
      touch-action: none;
    }

    body {
      position: fixed;
      inset: 0;
      color: var(--text);
    }

    #space {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      background:
        radial-gradient(circle at 18% 16%, rgba(255, 122, 191, 0.34), transparent 30%),
        radial-gradient(circle at 82% 12%, rgba(115, 247, 255, 0.20), transparent 28%),
        radial-gradient(circle at 72% 80%, rgba(155, 109, 255, 0.32), transparent 34%),
        linear-gradient(145deg, #130625 0%, #090416 45%, #160922 100%);
    }

    .screen {
      position: fixed;
      inset: 0;
      z-index: 4;
      display: grid;
      place-items: center;
      padding: max(18px, env(safe-area-inset-top)) 18px max(18px, env(safe-area-inset-bottom));
      pointer-events: none;
    }

    .intro {
      width: min(680px, 94vw);
      text-align: center;
      pointer-events: auto;
      animation: rise 900ms ease both;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 8vw, 78px);
      line-height: 1.08;
      letter-spacing: 0;
      text-shadow: 0 0 18px rgba(255, 122, 191, 0.85), 0 0 44px rgba(155, 109, 255, 0.65);
    }

    .intro p {
      max-width: 560px;
      margin: 18px auto 28px;
      color: rgba(255, 247, 255, 0.82);
      font-size: clamp(15px, 3.6vw, 18px);
      line-height: 1.7;
    }

    .panel {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 5;
      display: none;
      gap: 10px;
      align-items: center;
      justify-content: center;
      padding: 12px 12px max(12px, env(safe-area-inset-bottom));
      background: linear-gradient(to top, rgba(8, 4, 23, 0.86), rgba(8, 4, 23, 0.14));
      pointer-events: none;
    }

    .panel.show {
      display: flex;
    }

    .status {
      min-width: 0;
      max-width: min(520px, 46vw);
      padding: 12px 16px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.10);
      box-shadow: 0 0 28px rgba(255, 122, 191, 0.20);
      color: rgba(255, 247, 255, 0.92);
      font-size: 14px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      backdrop-filter: blur(14px);
    }

    button {
      min-height: 48px;
      border: 0;
      border-radius: 999px;
      padding: 0 20px;
      color: white;
      background: linear-gradient(135deg, #ff5ca8, #9b6dff);
      box-shadow: 0 10px 26px rgba(255, 79, 154, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.35);
      font: 700 15px/1 "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
      cursor: pointer;
      pointer-events: auto;
      transition: transform 160ms ease, filter 160ms ease;
    }

    button:active {
      transform: scale(0.96);
      filter: brightness(1.08);
    }

    .start {
      min-width: min(86vw, 310px);
      min-height: 58px;
      font-size: 18px;
    }

    .ghost {
      background: rgba(255, 255, 255, 0.13);
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow: 0 10px 24px rgba(115, 247, 255, 0.14);
    }

    .decor {
      position: fixed;
      z-index: 2;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .decor span {
      position: absolute;
      width: 12px;
      height: 12px;
      opacity: 0.70;
      filter: drop-shadow(0 0 10px rgba(255, 122, 191, 0.9));
      animation: drift var(--t) ease-in-out infinite alternate;
    }

    .decor .heart {
      background: var(--pink);
      transform: rotate(45deg);
      border-radius: 3px;
    }

    .decor .heart::before,
    .decor .heart::after {
      content: "";
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: inherit;
    }

    .decor .heart::before {
      left: -6px;
    }

    .decor .heart::after {
      top: -6px;
    }

    .decor .star {
      background: var(--gold);
      clip-path: polygon(50% 0, 61% 35%, 98% 35%, 68% 56%, 79% 92%, 50% 70%, 21% 92%, 32% 56%, 2% 35%, 39% 35%);
    }

    .toast {
      position: fixed;
      left: 50%;
      top: 50%;
      z-index: 8;
      width: min(520px, calc(100vw - 34px));
      padding: 22px 20px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 26px;
      background: rgba(28, 10, 42, 0.88);
      box-shadow: 0 0 44px rgba(255, 122, 191, 0.48);
      text-align: center;
      color: white;
      font-size: clamp(18px, 5vw, 25px);
      line-height: 1.55;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, -50%) scale(0.88);
      transition: opacity 220ms ease, transform 220ms ease;
      backdrop-filter: blur(16px);
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .hint {
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      left: 50%;
      z-index: 6;
      width: min(720px, calc(100vw - 24px));
      padding: 10px 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.12);
      color: rgba(255, 247, 255, 0.84);
      font-size: 13px;
      line-height: 1.5;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, -10px);
      transition: opacity 220ms ease, transform 220ms ease;
      backdrop-filter: blur(12px);
    }

    .hint.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    video {
      position: fixed;
      right: 12px;
      top: max(12px, env(safe-area-inset-top));
      z-index: 3;
      width: min(26vw, 150px);
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 18px;
      opacity: 0;
      transform: scaleX(-1);
      pointer-events: none;
      transition: opacity 220ms ease;
    }

    video.on {
      opacity: 0.28;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(18px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes drift {
      from { transform: translate3d(0, 0, 0) rotate(0deg) scale(0.8); }
      to { transform: translate3d(var(--x), var(--y), 0) rotate(18deg) scale(1.24); }
    }

    @media (max-width: 720px) {
      .panel.show {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .status {
        grid-column: 1 / -1;
        max-width: none;
        width: 100%;
        text-align: center;
        font-size: 13px;
      }

      button {
        width: 100%;
        padding: 0 12px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <canvas id="space" aria-label="互动粒子宇宙"></canvas>

  <div class="decor" id="decor" aria-hidden="true"></div>

  <main class="screen" id="intro">
    <section class="intro">
      <h1>吴浩和韩沛昀的粒子宇宙</h1>
      <p>手指拖动星光，宇宙会跟着吸引、旋转、扩散和聚合。也可以试试摄像头手势，让小手接管这片发光星云。</p>
      <button class="start" id="startBtn">开启粒子宇宙</button>
    </section>
  </main>

  <div class="hint" id="hint">正在加载吴浩和韩沛昀的宇宙坐标</div>

  <section class="panel" id="panel" aria-label="粒子宇宙控制台">
    <div class="status" id="status">正在加载吴浩和韩沛昀的宇宙坐标</div>
    <button id="shapeBtn">切换形状</button>
    <button class="ghost" id="cameraBtn">开启手势</button>
  </section>

  <video id="camera" playsinline muted></video>
  <div class="toast" id="toast"></div>

  <script>
    (() => {
      "use strict";

      const CONFIG = {
        title: "吴浩和韩沛昀的粒子宇宙",
        names: "吴浩 韩沛昀",
        particleCount: Math.min(1900, Math.max(920, Math.floor(innerWidth * innerHeight / 520))),
        statuses: [
          "正在加载吴浩和韩沛昀的宇宙坐标",
          "小狗小猫爪印匹配成功",
          "爱心能量上升中",
          "银河正在为你们旋转",
          "星球已进入恋爱轨道"
        ],
        cameraFailText: "请允许摄像头权限，不然宇宙检测不到你的小手；也可以直接用手指拖动玩。",
        eggText: "吴浩小狗和韩沛昀小猫绑定成功，奖励亲亲一个，请线下领取。"
      };

      const canvas = document.getElementById("space");
      const ctx = canvas.getContext("2d", { alpha: false });
      const intro = document.getElementById("intro");
      const panel = document.getElementById("panel");
      const statusEl = document.getElementById("status");
      const startBtn = document.getElementById("startBtn");
      const shapeBtn = document.getElementById("shapeBtn");
      const cameraBtn = document.getElementById("cameraBtn");
      const hint = document.getElementById("hint");
      const toast = document.getElementById("toast");
      const video = document.getElementById("camera");
      const decor = document.getElementById("decor");

      let width = 0;
      let height = 0;
      let dpr = 1;
      let started = false;
      let shapeIndex = 0;
      let switchCount = 0;
      let lastTap = { x: 0, y: 0, time: 0, moved: false };
      let targetPoints = [];
      let handMode = "none";
      let hands = null;
      let cameraLoopRunning = false;

      const pointer = {
        active: false,
        x: innerWidth / 2,
        y: innerHeight / 2,
        px: innerWidth / 2,
        py: innerHeight / 2,
        power: 0,
        spin: 0
      };

      const palettes = [
        ["#ff78bd", "#fff0fa", "#9b6dff", "#73f7ff"],
        ["#ff9dcc", "#ffe28a", "#b989ff", "#fff8fb"],
        ["#ff5c9e", "#ffc1de", "#fff0f9", "#8beeff"],
        ["#8e7cff", "#73f7ff", "#ff78bd", "#fff8d7"],
        ["#ffe28a", "#ff78bd", "#9b6dff", "#73f7ff"]
      ];

      const particles = Array.from({ length: CONFIG.particleCount }, (_, i) => ({
        x: Math.random() * innerWidth,
        y: Math.random() * innerHeight,
        vx: (Math.random() - 0.5) * 2,
        vy: (Math.random() - 0.5) * 2,
        tx: innerWidth / 2,
        ty: innerHeight / 2,
        size: 0.8 + Math.random() * 1.9,
        color: palettes[0][i % palettes[0].length],
        phase: Math.random() * Math.PI * 2,
        orbit: Math.random()
      }));

      function resize() {
        dpr = Math.min(devicePixelRatio || 1, 2);
        width = innerWidth;
        height = innerHeight;
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        canvas.style.width = width + "px";
        canvas.style.height = height + "px";
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        buildTargets(shapeIndex);
      }

      function makeDecor() {
        decor.innerHTML = "";
        for (let i = 0; i < 26; i++) {
          const node = document.createElement("span");
          node.className = i % 3 ? "heart" : "star";
          node.style.left = Math.random() * 100 + "%";
          node.style.top = Math.random() * 100 + "%";
          node.style.setProperty("--x", (Math.random() * 44 - 22) + "px");
          node.style.setProperty("--y", (Math.random() * 54 - 27) + "px");
          node.style.setProperty("--t", (3 + Math.random() * 4) + "s");
          node.style.animationDelay = (-Math.random() * 5) + "s";
          node.style.transform = "scale(" + (0.7 + Math.random() * 1.3) + ")";
          decor.appendChild(node);
        }
      }

      function sampleCanvas(draw, step = 7) {
        const off = document.createElement("canvas");
        const scale = Math.min(width, height) < 560 ? 0.82 : 1;
        off.width = Math.max(360, Math.floor(width * 0.86));
        off.height = Math.max(260, Math.floor(height * 0.54));
        const octx = off.getContext("2d");
        octx.clearRect(0, 0, off.width, off.height);
        draw(octx, off.width, off.height, scale);
        const data = octx.getImageData(0, 0, off.width, off.height).data;
        const points = [];
        for (let y = 0; y < off.height; y += step) {
          for (let x = 0; x < off.width; x += step) {
            if (data[(y * off.width + x) * 4 + 3] > 80) {
              points.push({
                x: x + (width - off.width) / 2 + (Math.random() - 0.5) * 2,
                y: y + (height - off.height) / 2 + (Math.random() - 0.5) * 2
              });
            }
          }
        }
        return points;
      }

      function textShape() {
        return sampleCanvas((octx, w, h) => {
          const size = Math.min(w / 5.6, h / 2.7);
          octx.fillStyle = "#fff";
          octx.textAlign = "center";
          octx.textBaseline = "middle";
          octx.font = "900 " + size + "px Microsoft YaHei, PingFang SC, sans-serif";
          octx.fillText("吴浩", w / 2, h * 0.39);
          octx.fillText("韩沛昀", w / 2, h * 0.64);
        }, Math.max(5, Math.round(Math.min(width, height) / 120)));
      }

      function heartShape() {
        const pts = [];
        const cx = width / 2;
        const cy = height / 2 + height * 0.02;
        const scale = Math.min(width, height) / 34;
        for (let i = 0; i < 1700; i++) {
          const t = Math.random() * Math.PI * 2;
          const r = Math.sqrt(Math.random());
          const x = 16 * Math.pow(Math.sin(t), 3);
          const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
          pts.push({ x: cx + x * scale * r, y: cy + y * scale * r });
        }
        return pts.concat(textShape().filter((_, i) => i % 3 === 0));
      }

      function pawShape() {
        return sampleCanvas((octx, w, h) => {
          const drawPaw = (cx, cy, s, cat) => {
            octx.fillStyle = "#fff";
            const pads = cat
              ? [[-0.32, -0.38, 0.16], [-0.1, -0.5, 0.14], [0.12, -0.5, 0.14], [0.33, -0.38, 0.16]]
              : [[-0.36, -0.36, 0.18], [-0.12, -0.52, 0.17], [0.12, -0.52, 0.17], [0.36, -0.36, 0.18]];
            pads.forEach(([x, y, r]) => {
              octx.beginPath();
              octx.ellipse(cx + x * s, cy + y * s, r * s, r * s * 1.16, 0, 0, Math.PI * 2);
              octx.fill();
            });
            octx.beginPath();
            octx.ellipse(cx, cy + 0.08 * s, 0.34 * s, cat ? 0.30 * s : 0.36 * s, 0, 0, Math.PI * 2);
            octx.fill();
            octx.beginPath();
            octx.ellipse(cx - 0.20 * s, cy + 0.25 * s, 0.18 * s, 0.22 * s, -0.35, 0, Math.PI * 2);
            octx.ellipse(cx + 0.20 * s, cy + 0.25 * s, 0.18 * s, 0.22 * s, 0.35, 0, Math.PI * 2);
            octx.fill();
          };
          const s = Math.min(w, h) * 0.26;
          drawPaw(w * 0.31, h * 0.52, s, false);
          drawPaw(w * 0.69, h * 0.52, s * 0.88, true);
          octx.save();
          octx.translate(w / 2, h * 0.54);
          octx.scale(0.62, 0.62);
          octx.beginPath();
          for (let t = 0; t <= Math.PI * 2 + 0.02; t += 0.05) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            const px = x * s / 34;
            const py = y * s / 34;
            if (t === 0) octx.moveTo(px, py);
            else octx.lineTo(px, py);
          }
          octx.fill();
          octx.restore();
        }, Math.max(5, Math.round(Math.min(width, height) / 120)));
      }

      function galaxyShape() {
        const pts = [];
        const cx = width / 2;
        const cy = height / 2;
        const maxR = Math.min(width, height) * 0.47;
        for (let i = 0; i < 2200; i++) {
          const arm = i % 4;
          const r = Math.pow(Math.random(), 0.7) * maxR;
          const angle = arm * Math.PI / 2 + r * 0.026 + (Math.random() - 0.5) * 0.72;
          const oval = 0.62 + Math.random() * 0.20;
          pts.push({
            x: cx + Math.cos(angle) * r + (Math.random() - 0.5) * 22,
            y: cy + Math.sin(angle) * r * oval + (Math.random() - 0.5) * 22
          });
        }
        return pts;
      }

      function planetShape() {
        const pts = [];
        const cx = width / 2;
        const cy = height / 2;
        const r = Math.min(width, height) * 0.19;
        for (let i = 0; i < 1050; i++) {
          const a = Math.random() * Math.PI * 2;
          const rr = Math.sqrt(Math.random()) * r;
          pts.push({ x: cx + Math.cos(a) * rr, y: cy + Math.sin(a) * rr });
        }
        for (let i = 0; i < 820; i++) {
          const a = Math.random() * Math.PI * 2;
          const rr = r * (1.28 + Math.random() * 0.60);
          const tilt = 0.31;
          const x = Math.cos(a) * rr;
          const y = Math.sin(a) * rr * 0.25;
          pts.push({
            x: cx + x * Math.cos(tilt) - y * Math.sin(tilt),
            y: cy + x * Math.sin(tilt) + y * Math.cos(tilt)
          });
        }
        for (let i = 0; i < 260; i++) {
          const a = Math.random() * Math.PI * 2;
          const rr = r * (2.2 + Math.random() * 1.2);
          pts.push({ x: cx + Math.cos(a) * rr, y: cy + Math.sin(a) * rr });
        }
        return pts;
      }

      function buildTargets(index) {
        const builders = [textShape, pawShape, heartShape, galaxyShape, planetShape];
        targetPoints = builders[index]();
        if (!targetPoints.length) targetPoints = galaxyShape();
        const colors = palettes[index];
        particles.forEach((p, i) => {
          const t = targetPoints[i % targetPoints.length];
          p.tx = t.x;
          p.ty = t.y;
          p.color = colors[i % colors.length];
          p.phase = Math.random() * Math.PI * 2;
        });
      }

      function switchShape() {
        shapeIndex = (shapeIndex + 1) % CONFIG.statuses.length;
        switchCount += 1;
        buildTargets(shapeIndex);
        setStatus(CONFIG.statuses[shapeIndex]);
        if (switchCount === 5) {
          showToast(CONFIG.eggText, 5200);
        }
      }

      function setStatus(text) {
        statusEl.textContent = text;
        hint.textContent = text;
        hint.classList.add("show");
        clearTimeout(setStatus.timer);
        setStatus.timer = setTimeout(() => hint.classList.remove("show"), 2200);
      }

      function showToast(text, ms = 3200) {
        toast.textContent = text;
        toast.classList.add("show");
        clearTimeout(showToast.timer);
        showToast.timer = setTimeout(() => toast.classList.remove("show"), ms);
      }

      function drawBackground(now) {
        const grad = ctx.createRadialGradient(width * 0.5, height * 0.52, 0, width * 0.5, height * 0.52, Math.max(width, height));
        grad.addColorStop(0, "rgba(34, 11, 50, 0.42)");
        grad.addColorStop(0.48, "rgba(9, 4, 22, 0.34)");
        grad.addColorStop(1, "rgba(5, 2, 14, 0.70)");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, width, height);

        ctx.save();
        ctx.globalAlpha = 0.22;
        for (let i = 0; i < 52; i++) {
          const x = (Math.sin(i * 43.21) * 0.5 + 0.5) * width;
          const y = (Math.cos(i * 29.77) * 0.5 + 0.5) * height;
          const pulse = 0.5 + Math.sin(now * 0.0015 + i) * 0.5;
          ctx.fillStyle = i % 5 ? "#fff7ff" : "#73f7ff";
          ctx.beginPath();
          ctx.arc(x, y, 0.7 + pulse * 1.3, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      function updateParticles(now) {
        const cx = width / 2;
        const cy = height / 2;
        const handOpen = handMode === "open";
        const handClosed = handMode === "closed";
        const activePower = pointer.power;
        const interactionRadius = Math.min(width, height) * 0.34;
        pointer.spin *= 0.94;

        particles.forEach((p, i) => {
          let tx = p.tx;
          let ty = p.ty;

          if (shapeIndex === 2) {
            const a = now * 0.0006 + p.orbit * Math.PI * 2;
            tx += Math.cos(a) * 10;
            ty += Math.sin(a) * 10;
          }

          if (shapeIndex === 3) {
            const dx = tx - cx;
            const dy = ty - cy;
            const a = 0.0028;
            tx = cx + dx * Math.cos(a) - dy * Math.sin(a);
            ty = cy + dx * Math.sin(a) + dy * Math.cos(a);
            p.tx = tx;
            p.ty = ty;
          }

          const dxp = p.x - pointer.x;
          const dyp = p.y - pointer.y;
          const dist = Math.hypot(dxp, dyp) || 1;

          if (activePower > 0.01 && dist < interactionRadius) {
            const f = (1 - dist / interactionRadius) * activePower;
            const dir = (handOpen || shapeIndex === 3) ? 1 : -1;
            p.vx += (dxp / dist) * f * 2.1 * dir;
            p.vy += (dyp / dist) * f * 2.1 * dir;
            p.vx += (-dyp / dist) * f * (1.4 + pointer.spin);
            p.vy += (dxp / dist) * f * (1.4 + pointer.spin);
          }

          if (handClosed) {
            tx = pointer.x + (tx - cx) * 0.34;
            ty = pointer.y + (ty - cy) * 0.34;
          }

          if (handOpen) {
            tx += (tx - cx) * 0.22;
            ty += (ty - cy) * 0.22;
          }

          p.vx += (tx - p.x) * 0.010;
          p.vy += (ty - p.y) * 0.010;
          p.vx *= 0.88;
          p.vy *= 0.88;
          p.x += p.vx;
          p.y += p.vy;

          if (p.x < -60 || p.x > width + 60 || p.y < -60 || p.y > height + 60) {
            p.x = Math.random() * width;
            p.y = Math.random() * height;
            p.vx = 0;
            p.vy = 0;
          }

          const pulse = 0.72 + Math.sin(now * 0.004 + p.phase) * 0.28;
          ctx.globalAlpha = 0.72 + pulse * 0.25;
          ctx.fillStyle = p.color;
          ctx.shadowColor = p.color;
          ctx.shadowBlur = 9 + pulse * 10;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * pulse, 0, Math.PI * 2);
          ctx.fill();

          if (i % 19 === 0) {
            ctx.globalAlpha = 0.18;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * 3.8, 0, Math.PI * 2);
            ctx.fill();
          }
        });
        ctx.globalAlpha = 1;
        ctx.shadowBlur = 0;
      }

      function animate(now) {
        drawBackground(now);
        updateParticles(now);
        pointer.power *= pointer.active ? 0.985 : 0.92;
        requestAnimationFrame(animate);
      }

      function startUniverse() {
        if (started) return;
        started = true;
        intro.style.display = "none";
        panel.classList.add("show");
        setStatus(CONFIG.statuses[0]);
        buildTargets(0);
      }

      function pointerDown(x, y) {
        startUniverse();
        pointer.active = true;
        pointer.x = pointer.px = x;
        pointer.y = pointer.py = y;
        pointer.power = 1;
        lastTap = { x, y, time: performance.now(), moved: false };
      }

      function pointerMove(x, y) {
        const travel = Math.hypot(x - pointer.px, y - pointer.py);
        if (Math.hypot(x - lastTap.x, y - lastTap.y) > 12) lastTap.moved = true;
        pointer.spin = Math.min(3.2, travel / 9);
        pointer.px = pointer.x;
        pointer.py = pointer.y;
        pointer.x = x;
        pointer.y = y;
        pointer.power = Math.min(1.25, pointer.power + 0.08);
      }

      function pointerUp(x, y) {
        pointer.active = false;
        pointer.x = x;
        pointer.y = y;
        const quickTap = performance.now() - lastTap.time < 280 && !lastTap.moved;
        const onButton = document.elementFromPoint(x, y)?.closest?.("button");
        if (started && quickTap && !onButton) switchShape();
      }

      canvas.addEventListener("pointerdown", (e) => {
        canvas.setPointerCapture?.(e.pointerId);
        pointerDown(e.clientX, e.clientY);
      });

      canvas.addEventListener("pointermove", (e) => {
        if (pointer.active) pointerMove(e.clientX, e.clientY);
      });

      canvas.addEventListener("pointerup", (e) => pointerUp(e.clientX, e.clientY));
      canvas.addEventListener("pointercancel", () => pointer.active = false);

      startBtn.addEventListener("click", startUniverse);
      shapeBtn.addEventListener("click", () => {
        startUniverse();
        switchShape();
      });

      async function loadScript(src) {
        return new Promise((resolve, reject) => {
          const old = document.querySelector("script[src='" + src + "']");
          if (old) return resolve();
          const script = document.createElement("script");
          script.src = src;
          script.async = true;
          script.onload = resolve;
          script.onerror = reject;
          document.head.appendChild(script);
        });
      }

      async function enableCamera() {
        startUniverse();
        cameraBtn.disabled = true;
        cameraBtn.textContent = "手势连接中";
        try {
          await loadScript("https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js");
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } },
            audio: false
          });
          video.srcObject = stream;
          await video.play();
          video.classList.add("on");

          hands = new Hands({
            locateFile: (file) => "https://cdn.jsdelivr.net/npm/@mediapipe/hands/" + file
          });
          hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 0,
            minDetectionConfidence: 0.62,
            minTrackingConfidence: 0.58
          });
          hands.onResults(onHandResults);
          cameraLoopRunning = true;
          cameraBtn.textContent = "手势已开启";
          setStatus("小手已接入粒子宇宙，张开扩散，握紧聚合");
          cameraLoop();
        } catch (err) {
          cameraBtn.disabled = false;
          cameraBtn.textContent = "开启手势";
          showToast(CONFIG.cameraFailText, 5200);
          setStatus(CONFIG.cameraFailText);
        }
      }

      async function cameraLoop() {
        if (!cameraLoopRunning || !hands || video.readyState < 2) {
          requestAnimationFrame(cameraLoop);
          return;
        }
        try {
          await hands.send({ image: video });
        } catch (err) {
          cameraLoopRunning = false;
          cameraBtn.disabled = false;
          cameraBtn.textContent = "开启手势";
          showToast(CONFIG.cameraFailText, 5200);
        }
        if (cameraLoopRunning) requestAnimationFrame(cameraLoop);
      }

      function onHandResults(results) {
        const marks = results.multiHandLandmarks && results.multiHandLandmarks[0];
        if (!marks) {
          handMode = "none";
          pointer.power *= 0.96;
          return;
        }
        const wrist = marks[0];
        const tips = [4, 8, 12, 16, 20].map((n) => marks[n]);
        const palm = Math.hypot(marks[5].x - marks[17].x, marks[5].y - marks[17].y) || 0.1;
        const spread = tips.reduce((sum, p) => sum + Math.hypot(p.x - wrist.x, p.y - wrist.y), 0) / tips.length;
        handMode = spread / palm > 2.05 ? "open" : "closed";
        pointer.active = true;
        pointer.x = (1 - marks[9].x) * width;
        pointer.y = marks[9].y * height;
        pointer.power = handMode === "open" ? 1.12 : 0.95;
        pointer.spin = handMode === "open" ? 1.8 : 0.7;
      }

      cameraBtn.addEventListener("click", enableCamera);

      addEventListener("resize", resize, { passive: true });
      addEventListener("orientationchange", () => setTimeout(resize, 240), { passive: true });

      makeDecor();
      resize();
      requestAnimationFrame(animate);
    })();
  </script>
</body>
</html>
